name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Must match the tag created by this workflow."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, pack, publish
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore QuotaGlass.sln

      - name: Publish NMH
        run: >
          dotnet publish src/QuotaGlass.NMH/QuotaGlass.NMH.csproj
          -c Release
          -r win-${{ matrix.arch }}
          --self-contained false
          -p:PublishSingleFile=true
          -o installer/payload/${{ matrix.arch }}

      - name: Publish Widget
        run: >
          dotnet publish src/QuotaGlass.Widget/QuotaGlass.Widget.csproj
          -c Release
          -r win-${{ matrix.arch }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o installer/payload/${{ matrix.arch }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DMyAppVersion=${{ inputs.version }} ^
            /DAppArch=${{ matrix.arch }} ^
            installer\quotaglass.iss

      - name: Rename single-file portable EXEs for direct download
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p installer/dist
          cp installer/payload/${{ matrix.arch }}/QuotaGlass.Widget.exe \
             installer/dist/QuotaGlass-Widget-v${{ inputs.version }}-win-${{ matrix.arch }}.exe
          cp installer/payload/${{ matrix.arch }}/QuotaGlass.NMH.exe \
             installer/dist/QuotaGlass-NMH-v${{ inputs.version }}-win-${{ matrix.arch }}.exe

      - name: Create release + upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          if ! gh release view "$tag" > /dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Automated release for $tag." \
              || gh release view "$tag" > /dev/null
          fi
          gh release upload "$tag" installer/dist/*.exe --clobber
